<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventario App</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Inventario">
<meta name="theme-color" content="#5c6d5d">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #e8e4d4; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 24px 16px; }

  /* SPLASH */
  #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f9f6e7; z-index: 1000; display: flex; align-items: center; justify-content: center; }
  #splash img { width: 200px; max-width: 80%; animation: aparecer 1s ease forwards; }
  @keyframes aparecer { 0%{opacity:0;transform:scale(0.85)} 100%{opacity:1;transform:scale(1)} }

  /* LOGIN */
  #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f9f6e7; z-index: 999; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
  .login-logo { width: 200px; max-width: 80%; margin-bottom: 40px; }
  .login-card { background: #fff; border-radius: 20px; padding: 28px 24px; width: 100%; max-width: 360px; border: 1px solid #dbe3e2; }
  .login-title { font-size: 18px; font-weight: 600; color: #5c6d5d; margin-bottom: 20px; text-align: center; }
  .login-group { margin-bottom: 14px; }
  .login-label { font-size: 13px; font-weight: 500; color: #5c6d5d; margin-bottom: 6px; display: block; }
  .login-input { width: 100%; padding: 13px 14px; border: 1.5px solid #dbe3e2; border-radius: 12px; font-size: 15px; color: #333; background: #f9f6e7; outline: none; }
  .login-input:focus { border-color: #5c6d5d; background: #fff; }
  .login-btn { width: 100%; padding: 15px; border-radius: 12px; border: none; background: #5c6d5d; color: #f9f6e7; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px; }
  .login-btn:hover { background: #4a5a4b; }
  .login-btn:disabled { background: #9aab9b; cursor: not-allowed; }
  .login-error { font-size: 13px; color: #c9908a; text-align: center; margin-top: 12px; min-height: 20px; }

  /* APP */
  #app { display: none; max-width: 1080px; margin: 0 auto; width: 100%; }
  .header { background: #5c6d5d; border-radius: 20px; padding: 24px 20px; margin-bottom: 16px; text-align: center; }
  .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .header-btn { background: none; border: none; cursor: pointer; color: #cdd8b0; font-size: 18px; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; }
  .header-btn:hover { text-decoration: underline; text-underline-offset: 3px; }
  .header-btn img { height: 24px; }
  .header-user { font-size: 12px; color: #cdd8b0; margin-top: 6px; }
  .logo-header { width: 180px; max-width: 80%; margin: 0 auto; display: block; filter: brightness(0) invert(1); }
  .card { background: #fff; border-radius: 20px; padding: 20px; margin-bottom: 16px; border: 1px solid #dbe3e2; }
  .card-title { font-size: 12px; font-weight: 600; color: #5c6d5d; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; display: flex; align-items: center; gap: 6px; }
  .card-title::before { content: ''; display: inline-block; width: 3px; height: 14px; background: #f1d688; border-radius: 2px; }
  .alerta-banner { background: #fdf0ee; border: 1px solid #dbc0bd; border-radius: 12px; padding: 10px 14px; margin-bottom: 12px; font-size: 13px; color: #c9908a; display: none; }
  .producto-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid #f9f6e7; }
  .producto-item:last-child { border-bottom: none; }
  .producto-nombre { font-size: 15px; font-weight: 500; color: #333; }
  .producto-sub { font-size: 12px; color: #bbb; margin-top: 2px; }
  .badge-bajo { display: inline-flex; align-items: center; gap: 4px; background: #fdf0ee; color: #c9908a; font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 500; margin-top: 3px; }
  .stock-ring { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-direction: column; }
  .stock-ring-ok { background: #edf2ed; }
  .stock-ring-bajo { background: #fdf0ee; }
  .stock-ok { font-size: 22px; font-weight: 700; color: #5c6d5d; }
  .stock-bajo { font-size: 22px; font-weight: 700; color: #c9908a; }
  .stock-label { font-size: 10px; color: #bbb; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 13px; font-weight: 500; color: #5c6d5d; margin-bottom: 6px; display: block; }
  select, input[type=number], textarea { width: 100%; padding: 13px 14px; border: 1.5px solid #dbe3e2; border-radius: 12px; font-size: 15px; color: #333; background: #f9f6e7; outline: none; appearance: none; font-family: inherit; }
  textarea { resize: none; height: 80px; font-size: 14px; }
  select:focus, input:focus, textarea:focus { border-color: #5c6d5d; background: #fff; }
  .btn { width: 100%; padding: 16px; border-radius: 14px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 4px; }
  .btn-primary { background: #5c6d5d; color: #f9f6e7; }
  .btn-primary:hover { background: #4a5a4b; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { background: #9aab9b; cursor: not-allowed; }
  .btn-secondary { background: #f9f6e7; color: #5c6d5d; border: 1.5px solid #dbe3e2; margin-top: 8px; }

  /* SUCCESS */
  #success-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(92,109,93,0.92); z-index: 500; display: none; flex-direction: column; align-items: center; justify-content: center; }
  .success-icon { font-size: 72px; animation: popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275); }
  .success-msg { color: #f9f6e7; font-size: 20px; font-weight: 600; margin-top: 16px; }
  .success-sub { color: #cdd8b0; font-size: 14px; margin-top: 8px; }
  @keyframes popIn { 0%{transform:scale(0)} 100%{transform:scale(1)} }

  .skeleton-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid #f9f6e7; }
  .skeleton-item:last-child { border-bottom: none; }
  .skeleton-left { flex: 1; }
  .skeleton-line { height: 14px; border-radius: 6px; background: linear-gradient(90deg, #ede9d8 25%, #e0dcc8 50%, #ede9d8 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; margin-bottom: 8px; }
  .skeleton-line.w80 { width: 80%; }
  .skeleton-line.w40 { width: 40%; height: 10px; }
  .skeleton-circle { width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(90deg, #ede9d8 25%, #e0dcc8 50%, #ede9d8 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  .footer { text-align: center; padding: 20px 0 8px; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .footer-logo { height: 28px; opacity: 0.6; }
  .footer a { font-size: 11px; color: #bbb; text-decoration: underline; text-underline-offset: 2px; }
  .footer a:hover { color: #5c6d5d; }
  .footer p { font-size: 10px; color: #ccc; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 100px; font-size: 14px; font-weight: 500; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; z-index: 600; }
  .toast.show { opacity: 1; }
  .toast.error { background: #dbc0bd; color: #6b3f3a; }
  .toast.success { background: #5c6d5d; color: #f9f6e7; }
  .ultimo-update { font-size: 11px; color: #bbb; text-align: center; margin-top: 10px; }
</style>
</head>
<body>

<div id="splash">
  <img src="logo.png" alt="Inventario">
</div>

<div id="login-screen">
  <img src="logo.png" alt="Inventario" class="login-logo">
  <div class="login-card">
    <div class="login-title">Iniciar sesión</div>
    <div class="login-group">
      <label class="login-label">Correo</label>
      <input type="email" id="login-email" class="login-input" placeholder="correo@ejemplo.com">
    </div>
    <div class="login-group">
      <label class="login-label">Contraseña</label>
      <input type="password" id="login-password" class="login-input" placeholder="••••••••">
    </div>
    <button class="login-btn" id="login-btn" onclick="iniciarSesion()">Entrar</button>
    <p class="login-error" id="login-error"></p>
  </div>
  <div class="footer" style="margin-top:24px;">
    <img src="ntnatavergara_footer.png" alt="nt:natavergara" class="footer-logo">
    <a href="terminos.html" target="_blank">Términos y condiciones de uso</a>
    <p>Desarrollado por nt:natavergara</p>
  </div>
</div>

<div id="success-overlay">
  <div class="success-icon">✓</div>
  <div class="success-msg" id="success-msg"></div>
  <div class="success-sub" id="success-sub"></div>
</div>

<div id="app">
  <div class="header">
    <div class="header-top">
      <button class="header-btn" onclick="cerrarSesion()"><img src="icono-salir.svg" style="height:24px;" alt=""> salir</button>
      <button class="header-btn" onclick="cargarInventario()">actualizar <img src="icono-actualizar.svg" style="height:24px;" alt=""></button>
    </div>
    <img src="logo.png" alt="Inventario" class="logo-header">
    <div class="header-user" id="header-user"></div>
  </div>

  <div class="card">
    <div class="card-title">Stock actual</div>
    <div id="alerta-banner" class="alerta-banner"></div>
    <div id="lista-productos">
      <div class="loading">Cargando...</div>
    </div>
    <p class="ultimo-update" id="ultimo-update"></p>
  </div>

  <div class="card">
    <div class="card-title">Registrar venta</div>
    <div class="form-group">
      <label class="form-label">Producto</label>
      <select id="select-producto">
        <option value="">Selecciona un producto...</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Cantidad vendida</label>
      <input type="number" id="input-cantidad" min="1" value="1">
    </div>
    <div class="form-group">
      <label class="form-label">Nota (opcional)</label>
      <textarea id="input-nota" placeholder="Ej: venta feria artesanal..."></textarea>
    </div>
    <button class="btn btn-primary" id="btn-registrar" onclick="registrarVenta()">Registrar venta</button>
    <button class="btn btn-secondary" onclick="cargarInventario()">Actualizar inventario</button>
  </div>

  <div class="footer">
    <img src="ntnatavergara_footer.png" alt="nt:natavergara" class="footer-logo">
    <a href="terminos.html" target="_blank">Términos y condiciones de uso</a>
    <p>Desarrollado por nt:natavergara</p>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDh_-2o-91WkkYvUUTPbD3AvXMMyQRYjhA",
  authDomain: "inventario-tresense.firebaseapp.com",
  projectId: "inventario-tresense",
  storageBucket: "inventario-tresense.firebasestorage.app",
  messagingSenderId: "895266379383",
  appId: "1:895266379383:web:c400da1606752a593d9872"
};

const firebaseApp = initializeApp(firebaseConfig);
const auth = getAuth(firebaseApp);

const API_URL = "https://script.google.com/macros/s/AKfycbxCV6Rx5HFkaFcxsilL1juz-JoWusyPhKjb4kURSNyU1wD4meej5mzhEAFlSSE8mON7/exec";
const INACTIVIDAD_MS = 5 * 60 * 1000;
let timerInactividad = null;

window.onload = function() {
  setTimeout(function() {
    document.getElementById('splash').style.display = 'none';
  }, 1500);
};

onAuthStateChanged(auth, function(user) {
  document.getElementById('splash').style.display = 'none';
  if (user) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('header-user').textContent = user.email;
    cargarInventario();
    resetInactividad();
  } else {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
});

window.iniciarSesion = async function() {
  var email = document.getElementById('login-email').value.trim();
  var password = document.getElementById('login-password').value;
  var btn = document.getElementById('login-btn');
  var errorEl = document.getElementById('login-error');
  if (!email || !password) { errorEl.textContent = 'Escribe tu correo y contraseña.'; return; }
  btn.disabled = true;
  btn.textContent = 'Entrando...';
  errorEl.textContent = '';
  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch(e) {
    errorEl.textContent = 'Correo o contraseña incorrectos.';
    btn.disabled = false;
    btn.textContent = 'Entrar';
  }
};

window.cerrarSesion = async function() {
  clearTimeout(timerInactividad);
  sessionStorage.removeItem('inventario_cache');
  await signOut(auth);
};

function resetInactividad() {
  clearTimeout(timerInactividad);
  timerInactividad = setTimeout(function() {
    signOut(auth);
    mostrarToast('Sesión cerrada por inactividad', 'error');
  }, INACTIVIDAD_MS);
}

document.addEventListener('touchstart', resetInactividad);
document.addEventListener('click', resetInactividad);

function renderProductos(datos) {
  var select = document.getElementById('select-producto');
  select.innerHTML = '<option value="">Selecciona un producto...</option>';
  var html = '';
  var alertas = [];
  for (var i = 1; i < datos.length; i++) {
    if (!datos[i][0]) continue;
    var nombre = datos[i][0];
    var stock = datos[i][1];
    var minimo = datos[i][2] || 3;
    var bajo = stock <= minimo;
    if (bajo) alertas.push(nombre);
    html += '<div class="producto-item"><div><div class="producto-nombre">' + nombre + '</div>';
    html += bajo ? '<span class="badge-bajo">Reponer pronto</span>' : '<div class="producto-sub">En stock</div>';
    html += '</div><div class="stock-ring ' + (bajo ? 'stock-ring-bajo' : 'stock-ring-ok') + '">';
    html += '<div class="' + (bajo ? 'stock-bajo' : 'stock-ok') + '">' + stock + '</div>';
    html += '<div class="stock-label">uds</div></div></div>';
    select.innerHTML += '<option value="' + nombre + '">' + nombre + ' (' + stock + ' uds)</option>';
  }
  document.getElementById('lista-productos').innerHTML = html;
  document.getElementById('alerta-banner').style.display = 'none';
  if (alertas.length > 0) {
    var banner = document.getElementById('alerta-banner');
    banner.textContent = '⚠ Stock bajo: ' + alertas.join(', ');
    banner.style.display = 'block';
  }
  var ahora = new Date();
  document.getElementById('ultimo-update').textContent = 'Actualizado: ' + ahora.toLocaleTimeString('es-CO', {hour:'2-digit', minute:'2-digit'});
}

function mostrarSkeleton() {
  var html = '';
  for (var i = 0; i < 3; i++) {
    html += '<div class="skeleton-item"><div class="skeleton-left"><div class="skeleton-line w80"></div><div class="skeleton-line w40"></div></div><div class="skeleton-circle"></div></div>';
  }
  document.getElementById('lista-productos').innerHTML = html;
}

window.cargarInventario = async function() {
  var cache = sessionStorage.getItem('inventario_cache');
  if (cache) {
    renderProductos(JSON.parse(cache));
  } else {
    mostrarSkeleton();
  }
  document.getElementById('alerta-banner').style.display = 'none';
  try {
    var res = await fetch(API_URL);
    var datos = await res.json();
    sessionStorage.setItem('inventario_cache', JSON.stringify(datos));
    renderProductos(datos);
  } catch(e) {
    document.getElementById('lista-productos').innerHTML = '<div style="text-align:center;padding:24px;color:#bbb;font-size:14px;">Error cargando datos.</div>';
    mostrarToast('Error de conexión', 'error');
  }
};

window.registrarVenta = async function() {
  var producto = document.getElementById('select-producto').value;
  var cantidad = parseInt(document.getElementById('input-cantidad').value);
  var nota = document.getElementById('input-nota').value.trim();
  if (!producto) { mostrarToast('Selecciona un producto', 'error'); return; }
  if (!cantidad || cantidad < 1) { mostrarToast('Escribe una cantidad válida', 'error'); return; }
  var btn = document.getElementById('btn-registrar');
  btn.disabled = true;
  btn.textContent = 'Registrando...';
  try {
    var res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ producto: producto, cantidad: cantidad, nota: nota }) });
    var data = await res.json();
    if (data.ok) {
      document.getElementById('input-cantidad').value = 1;
      document.getElementById('select-producto').value = '';
      document.getElementById('input-nota').value = '';
      mostrarExito(producto, cantidad, data.nuevoStock);
      await cargarInventario();
    } else {
      mostrarToast(data.error || 'Error al registrar', 'error');
    }
  } catch(e) {
    mostrarToast('Error de conexión', 'error');
  }
  btn.disabled = false;
  btn.textContent = 'Registrar venta';
};

function mostrarExito(producto, cantidad, stock) {
  var overlay = document.getElementById('success-overlay');
  document.getElementById('success-msg').textContent = producto;
  document.getElementById('success-sub').textContent = cantidad + ' unidad(es) vendida(s) · Stock: ' + stock;
  overlay.style.display = 'flex';
  setTimeout(function() { overlay.style.display = 'none'; }, 2200);
}

window.mostrarToast = function(msg, tipo) {
  var toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast show ' + (tipo || '');
  setTimeout(function() { toast.className = 'toast'; }, 3000);
}

function mostrarToast(msg, tipo) { window.mostrarToast(msg, tipo); }
</script>
</body>
</html>
